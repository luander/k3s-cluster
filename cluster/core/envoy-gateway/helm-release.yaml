---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: gateway-helm
      version: v1.7.1
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway-charts
        namespace: flux-system
  values:
    deployment:
      envoyGateway:
        replicas: 2
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            memory: 512Mi
