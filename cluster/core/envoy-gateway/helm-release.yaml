---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: gateway-helm
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway-charts
        namespace: flux-system
  install:
    createNamespace: true
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: Skip
    remediation:
      retries: 3
  values:
    deployment:
      envoyGateway:
        replicas: 2
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            memory: 512Mi
