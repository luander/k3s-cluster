---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: gateway-helm
      version: 1.7.1
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway-charts
        namespace: flux-system
      interval: 5m
  values:
    deployment:
      replicaCount: 2
      container:
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            memory: 512Mi
