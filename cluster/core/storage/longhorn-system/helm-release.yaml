---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://charts.longhorn.io
      chart: longhorn
      version: 1.11.0
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Use hotfix images for v1.11.0 as recommended in release notes
    image:
      longhorn:
        manager:
          tag: v1.11.0-hotfix-1
        instanceManager:
          tag: v1.11.0-hotfix-2
    
    # Required to allow hotfix version tags
    upgradeVersionCheck: false

    defaultSettings:
      backupTarget: nfs://10.0.8.12:/mnt/backup
      
      # STABILITY FIXES:
      # Automatically delete pods when a node goes down to trigger rescheduling
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      
      # Ensure pods are deleted if the volume is detached unexpectedly (e.g. CSI crash)
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      
      # Allow the node to drain even if it contains the last replica (rely on backups/other nodes)
      # This prevents "stuck" nodes during maintenance/upgrades
      nodeDrainPolicy: always-allow-eviction

      # Enable automatic salvage to recover from unexpected shutdowns
      autoSalvage: true

    persistence:
      defaultClassReplicaCount: 2

    ingress:
      enabled: false
      host: "lh.${SECRET_CLUSTER_DOMAIN}"
