---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://charts.longhorn.io
      chart: longhorn
      version: 1.10.2
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Disable version check to allow hotfix images in 1.11.x (prep)
    upgradeVersionCheck: false

    ingress:
      enabled: true
      host: "lh.${SECRET_CLUSTER_DOMAIN}"
      annotations:
        kubernetes.io/ingress.class: nginx

    defaultSettings:
      backupTarget: nfs://10.0.8.12:/mnt/backup

    persistence:
      defaultClassReplicaCount: 2
