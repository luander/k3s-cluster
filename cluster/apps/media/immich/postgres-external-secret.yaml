---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-database
  namespace: media
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-backend
  target:
    name: immich-database
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: immich
