---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: sabnzbd
  namespace: media
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: sabnzbd
  httpUpgrade:
  - type: websocket
  timeout:
    http:
      requestTimeout: 300s
      maxStreamDuration: 0s
  tcpKeepalive:
    idleTime: 60s
    interval: 30s
    probes: 5
  requestBuffer:
    limit: 100Mi
  retry:
    numRetries: 0
