---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controller:
      type: statefulset
    image:
      repository: ghcr.io/home-operations/qbittorrent
      tag: 5.1.4
    env:
      TZ: "Europe/Amsterdam"
      QBITTORRENT__PORT: &port 8080
      QBITTORRENT__BT_PORT: &bt-port 50413
      QBITTORRENT__BitTorrent__Session__SavePath: /downloads
      QBITTORRENT__BitTorrent__Session__TempPath: /downloads/incomplete
    service:
      main:
        ports:
          http:
            port: *port
      bittorrent:
        enabled: true
        type: LoadBalancer
        ports:
          bittorrent:
            enabled: true
            port: *bt-port
            protocol: TCP
    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"
      supplementalGroups:
      - 568
      - 100
    persistence:
      config:
        enabled: true
        existingClaim: qbittorrent-config
      media:
        enabled: true
        type: pvc
        existingClaim: media
        mountPath: /downloads
        subPath: downloads/qbittorrent
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 2048Mi
