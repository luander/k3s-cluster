---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: cloudflare-real-ip
  namespace: networking
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
  clientIPDetection:
    # Use CF-Connecting-IP exclusively for Cloudflare
    customHeader:
      name: "CF-Connecting-IP"
      failClosed: false
  timeout:
    http:
      requestReceivedTimeout: 300s
  tls:
    minVersion: "1.2"
    maxVersion: "1.3"
