---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: cloudflare-real-ip
  namespace: networking
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
  clientIPDetection:
    # Use CF-Connecting-IP exclusively for Cloudflare
    customHeader:
      name: "CF-Connecting-IP"
      failClosed: true
  http:
    requestTimeout: 300s
