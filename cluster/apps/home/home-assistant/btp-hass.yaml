---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: home-assistant-upgrade
  namespace: home
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: home-assistant
  httpUpgrade:
  - type: websocket
  timeout:
    http:
      requestTimeout: 60s
  tcpKeepalive:
    idleTime: 60s
    interval: 30s
    probes: 5
