---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dozzle
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  dependsOn:
    - name: metrics-server
      namespace: kube-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: amir20/dozzle
      tag: v10.5.3
    env:
      TZ: Europe/Amsterdam
      DOZZLE_MODE: k8s
    serviceAccount:
      create: false
      name: dozzle
    service:
      main:
        ports:
          http:
            port: 8080
    ingress:
      main:
        enabled: false
    resources:
      requests:
        cpu: 10m
        memory: 50Mi
      limits:
        memory: 128Mi
