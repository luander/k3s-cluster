---

- name: Set hostname {{ inventory_hostname }}
  hostname:
    name: "{{ inventory_hostname }}"

- name: Configure data disk
  ansible.builtin.include_tasks:
    file: tasks/data_disk.yaml
  vars:
    data_disk_fstype: xfs
    data_disk_label: gpt
    data_disk_mount_path: /data
    data_disk_mount_path_owner: root
    data_disk_mount_path_group: root
  when: data_disk_device | default(false)

- name: Install prerequisite apps
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  become: true
  loop:
    - python3
    - python3-pip
    - python3-kubernetes
    - nfs-common
    - cifs-utils

- name: Disable and mask multipathd to prevent conflicts with Longhorn iSCSI
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - multipathd.service
    - multipathd.socket
  become: true
  ignore_errors: true

- name: Flush multipath maps to release block device locks
  ansible.builtin.command:
    cmd: multipath -F
  become: true
  ignore_errors: true
  register: multipath_flush
  changed_when: multipath_flush.rc == 0

